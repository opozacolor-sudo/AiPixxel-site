<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STUDIO — build & content</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F4F1EA;
    --ink: #111111;
    --muted: #9b9690;
    --line: #d8d4cc;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    height: 100%;
    overflow: hidden;
  }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    display: flex;
    flex-direction: column;
  }
  .display { font-family: 'Archivo Black', sans-serif; }

  /* HEADER */
  header {
    flex-shrink: 0;
    z-index: 50;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 4vw;
    font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase;
    background: var(--ink);
    color: #fff;
  }
  .head-left { display: flex; gap: 10px; align-items: center; }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: #3FB950; animation: blink 2s infinite; }
  @keyframes blink { 50% { opacity: 0.2; } }
  .logo-center {
    font-family: 'Archivo Black', sans-serif; font-size: 18px; letter-spacing: 0.04em;
    text-align: center; line-height: 1;
  }
  .head-right { display: flex; gap: 28px; align-items: center; }
  .head-right span { opacity: 0.85; }
  @media (max-width: 768px) {
    .head-right > *:not(:last-child) { display: none; }
    header { padding: 16px 5vw; }
  }

  /* HERO */
  .hero {
    flex: 1;
    min-height: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    position: relative;
    padding: 0 4vw;
  }
  .hero-tagline {
    position: absolute; top: 6%;
    font-size: clamp(1.1rem, 2.4vw, 1.9rem);
    font-weight: 800; line-height: 1.15; letter-spacing: -0.01em;
    text-transform: uppercase;
  }
  .tagline-left { left: 4vw; text-align: left; }
  .tagline-right { right: 4vw; text-align: right; }
  .tagline-sub { color: var(--muted); }

  @media (max-width: 768px) {
    .tagline-right { display: none; }
    .tagline-left { font-size: 0.95rem; top: 4%; }
    .hero-stack { width: min(280px, 60vw); height: 46vh; }
  }

  .hero-stack {
    position: relative;
    width: min(380px, 32vw);
    height: min(480px, 52vh);
  }
  .stack-img {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 2px;
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.35);
    background: #000;
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .stack-img.side-left { transform: rotate(-7deg) translateX(-78%); }
  .stack-img.side-right { transform: rotate(6deg) translateX(78%); }
  .stack-img.center { transform: rotate(0deg); z-index: 2; cursor: pointer; }
  .stack-img.side-left, .stack-img.side-right { z-index: 1; opacity: 0.92; }

  .open-badge {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 90px; height: 90px; border-radius: 50%;
    background: rgba(244,241,234,0.92);
    display: flex; align-items: center; justify-content: center;
    text-align: center; font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.06em; line-height: 1.3;
    z-index: 3; pointer-events: none;
    opacity: 0; transition: opacity 0.3s ease;
  }
  .stack-img.center:hover ~ .open-badge,
  .hero-stack:hover .open-badge { opacity: 1; }

  /* SCROLL RULER */
  .ruler-wrap {
    flex-shrink: 0;
    position: relative;
    border-top: 1px solid var(--line);
    padding-top: 12px;
    margin: 0 4vw;
  }
  .ruler-ticks {
    height: 16px;
    background-image: repeating-linear-gradient(
      to right, var(--line) 0, var(--line) 1px, transparent 1px, transparent 14px
    );
    margin-bottom: 12px;
    position: relative;
  }
  .ruler-ticks::after {
    content: ''; display: block; width: 1px; height: 26px; background: var(--ink);
    position: absolute; top: -8px; left: 50%;
  }
  .services-viewport {
    position: relative;
    overflow: hidden;
    height: clamp(2.2rem, 5.5vw, 3.6rem);
  }
  .services-track {
    display: flex; gap: 64px;
    position: absolute; left: 50%; top: 0;
    transition: transform 0.5s cubic-bezier(0.65,0,0.35,1);
    will-change: transform;
  }
  .service-item {
    font-family: 'Archivo Black', sans-serif;
    font-size: clamp(1.5rem, 4vw, 2.8rem);
    text-transform: uppercase;
    color: var(--line);
    white-space: nowrap;
    transition: color 0.3s ease;
    cursor: pointer;
    flex-shrink: 0;
  }
  .service-item.active { color: var(--ink); }

  .nav-arrows {
    position: absolute; right: 0; bottom: 14px;
    display: flex; gap: 10px;
  }
  .nav-arrow {
    width: 34px; height: 34px; border-radius: 50%;
    border: 1px solid var(--line); background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 16px; color: var(--ink);
    transition: border-color 0.2s, background 0.2s;
  }
  .nav-arrow:hover { border-color: var(--ink); background: var(--ink); color: #fff; }

  .ruler-meta {
    display: flex; justify-content: space-between;
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted);
    margin-top: 12px;
    padding-bottom: 12px;
  }

  /* footer */
  footer {
    flex-shrink: 0;
    padding: 10px 4vw;
    display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px;
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted);
    border-top: 1px solid var(--line);
  }
  footer a { color: var(--ink); text-decoration: none; }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

<header>
  <div class="head-left">
    <span class="live-dot"></span>
    <span id="clock">BUCUREȘTI, RO // —</span>
  </div>
  <div class="logo-center display">STUDIO<br><span style="font-size:9px; letter-spacing:0.3em;">DANIEL</span></div>
  <div class="head-right">
    <span>INDEX</span>
    <span>ABOUT</span>
    <span>CONTACT</span>
  </div>
</header>

<section class="hero">
  <div class="hero-tagline tagline-left">
    Construim produse<br>
    <span class="tagline-sub">care funcționează.</span>
  </div>
  <div class="hero-tagline tagline-right">
    Design curat.<br>
    <span class="tagline-sub">Execuție rapidă.</span>
  </div>

  <div class="hero-stack">
    <img class="stack-img side-left" id="imgLeft" alt="">
    <img class="stack-img center" id="imgCenter" alt="">
    <img class="stack-img side-right" id="imgRight" alt="">
    <div class="open-badge">VEZI<br>PROIECTUL</div>
  </div>
</section>

<div class="ruler-wrap">
  <div class="ruler-ticks"></div>
  <div class="services-viewport">
    <div class="services-track" id="track"></div>
  </div>
  <div class="nav-arrows">
    <button class="nav-arrow" id="prevBtn" aria-label="Serviciul anterior">‹</button>
    <button class="nav-arrow" id="nextBtn" aria-label="Serviciul următor">›</button>
  </div>
  <div class="ruler-meta">
    <span>©2026 Daniel Studio</span>
    <span id="counter">01 // 06</span>
    <span>Powered by Claude + Higgsfield</span>
  </div>
</div>

<footer>
  <span>București, RO</span>
  <span>contact@daniel.studio</span>
  <span>Instagram</span>
</footer>

<script>
  // images - swap these URLs for your real generated assets
  const sets = [
    {
      left: "https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=600&auto=format&fit=crop",
      center: "PLACEHOLDER_BMW",
      right: "https://images.unsplash.com/photo-1542362567-b07e54358753?q=80&w=600&auto=format&fit=crop"
    },
    {
      left: "https://images.unsplash.com/photo-1499951360447-b19be8fe80f5?q=80&w=600&auto=format&fit=crop",
      center: "PLACEHOLDER_CODE",
      right: "https://images.unsplash.com/photo-1517694712202-14dd9538aa97?q=80&w=600&auto=format&fit=crop"
    },
    {
      left: "https://images.unsplash.com/photo-1551434678-e076c223a692?q=80&w=600&auto=format&fit=crop",
      center: "PLACEHOLDER_ASTRO",
      right: "https://images.unsplash.com/photo-1551836022-d5d88e9218df?q=80&w=600&auto=format&fit=crop"
    }
  ];

  const services = [
    { label: "Apps Mobile", set: 0 },
    { label: "Site-uri & Platforme", set: 1 },
    { label: "AI Agents", set: 2 },
    { label: "Content Video AI", set: 0 },
    { label: "Automatizări", set: 1 },
    { label: "Dashboard-uri", set: 2 },
  ];

  const N = services.length;
  // Build track with extra clones on each side for seamless looping
  const CLONES = 2;
  const track = document.getElementById('track');
  const totalItems = N + CLONES * 2;
  const startIndex = CLONES; // index of first "real" item

  for (let i = 0; i < totalItems; i++) {
    const svcIdx = ((i - CLONES) % N + N) % N;
    const div = document.createElement('div');
    div.className = 'service-item';
    div.textContent = services[svcIdx].label;
    div.dataset.real = svcIdx;
    div.addEventListener('click', () => {
      const diff = i - current;
      current += diff;
      render(true);
    });
    track.appendChild(div);
  }

  const items = Array.from(track.children);
  const imgLeft = document.getElementById('imgLeft');
  const imgCenter = document.getElementById('imgCenter');
  const imgRight = document.getElementById('imgRight');
  const counter = document.getElementById('counter');

  let current = startIndex; // position within full track

  function applyImages(setIdx) {
    const s = sets[setIdx];
    imgLeft.src = s.left;
    imgRight.src = s.right;
    imgCenter.style.background = "linear-gradient(135deg,#222,#444)";
    imgCenter.alt = s.center;
  }

  function render(animate) {
    items.forEach(el => el.classList.remove('active'));
    const activeEl = items[current];
    activeEl.classList.add('active');

    // center the active item: shift track so active item's center = viewport center (left:50%)
    const offset = activeEl.offsetLeft + activeEl.offsetWidth / 2;
    track.style.transition = animate ? 'transform 0.5s cubic-bezier(0.65,0,0.35,1)' : 'none';
    track.style.transform = `translateX(${-offset}px)`;

    const realIdx = parseInt(activeEl.dataset.real);
    applyImages(services[realIdx].set);
    counter.textContent = String(realIdx + 1).padStart(2, '0') + " // " + String(N).padStart(2, '0');

    // seamless loop: if we've drifted into clone zone, snap back without animation
    if (current < CLONES || current >= totalItems - CLONES) {
      setTimeout(() => {
        if (current < CLONES) current += N;
        else if (current >= totalItems - CLONES) current -= N;
        render(false);
      }, animate ? 520 : 0);
    }
  }

  document.getElementById('nextBtn').addEventListener('click', () => {
    current++;
    render(true);
  });
  document.getElementById('prevBtn').addEventListener('click', () => {
    current--;
    render(true);
  });

  window.addEventListener('resize', () => render(false));
  // initial render after layout settles
  requestAnimationFrame(() => render(false));

  // live clock
  function updateClock() {
    const now = new Date();
    const time = now.toLocaleTimeString('ro-RO', {hour:'2-digit', minute:'2-digit'});
    document.getElementById('clock').textContent = `BUCUREȘTI, RO // ${time}`;
  }
  updateClock();
  setInterval(updateClock, 30000);
</script>

</body>
</html>
